model:
  d_model: 512
  nhead: 8
  num_layers: 4
  eeg_input_dim: 64   # number of EEG channels
  bert_model: "emilyalsentzer/Bio_ClinicalBERT"

training:
  batch_size: 32
  lr: 1e-4
  epochs: 100
  temperature: 0.07

data:
  tuh_path: "data/TUH"
  physionet_path: "data/PhysioNet"
  reddit_path: "data/Reddit"
  clpsych_path: "data/CLPsych"
